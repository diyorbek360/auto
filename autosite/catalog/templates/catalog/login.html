<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kirish — TechZone</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ff6b35; --accent-glow: rgba(255,107,53,0.18);
      --gradient: linear-gradient(135deg, #ff6b35, #ff4500);
      --bg: #f1f5f9; --surface: #fff; --border: #e2e8f0;
      --text: #0f172a; --text-light: #64748b; --radius: 12px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #0f172a; padding: 0 32px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-size: 1.8rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
    .back-link { color: #94a3b8; font-size: 14px; text-decoration: none; }
    .back-link:hover { color: white; }
    .page-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
    .card { background: var(--surface); border-radius: 20px; border: 1px solid var(--border); padding: 48px 44px; width: 100%; max-width: 460px; }
    .label { font-size: 11px; font-weight: 700; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    h1 { font-size: 26px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .sub { font-size: 14px; color: var(--text-light); margin-bottom: 32px; }
    .field { margin-bottom: 18px; }
    .field label { display: block; font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 7px; }
    .field input { width: 100%; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 14px; color: var(--text); background: #f8fafc; outline: none; transition: 0.2s; font-family: inherit; }
    .field input:focus { border-color: var(--accent); background: #fff; box-shadow: 0 0 0 4px var(--accent-glow); }
    .forgot { text-align: right; margin-top: -12px; margin-bottom: 18px; }
    .forgot a { font-size: 13px; color: var(--accent); text-decoration: none; font-weight: 600; }
    .btn { width: 100%; padding: 13px; background: var(--gradient); color: white; font-weight: 700; font-size: 15px; border: none; border-radius: 10px; cursor: pointer; font-family: inherit; }
    .btn:hover { opacity: 0.9; }
    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
    .divider span { font-size: 13px; color: var(--text-light); }
    .divider hr { flex: 1; border: none; border-top: 1px solid var(--border); }
    .social-btn { width: 100%; padding: 11px; border: 1.5px solid var(--border); background: white; border-radius: 10px; font-size: 14px; font-weight: 600; color: var(--text); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-family: inherit; }
    .social-btn:hover { background: #f8fafc; }
    .switch { text-align: center; font-size: 14px; color: var(--text-light); margin-top: 24px; }
    .switch a { color: var(--accent); font-weight: 700; text-decoration: none; }
    .errors { background: #fff5f5; border: 1px solid #fecaca; border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 13px; color: #b91c1c; }
  </style>
</head>
<body>
<header>
  <a href="{% url 'home' %}" class="logo">TECHZONE</a>
  <a href="{% url 'home' %}" class="back-link"><i class="fas fa-arrow-left"></i> Bosh sahifa</a>
</header>
<div class="page-body">
  <div class="card">
    <div class="label">Xush kelibsiz</div>
    <h1>Hisobingizga kiring</h1>
    <p class="sub">Davom etish uchun ma'lumotlarni kiriting</p>

    {% if form.errors %}
      <div class="errors">Login yoki parol noto'g'ri.</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="field">
        <label for="username">Email yoki login</label>
        <input type="text" id="username" name="username" placeholder="email@example.com" required>
      </div>
      <div class="field">
        <label for="password">Parol</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>
      <div class="forgot"><a href="#">Parolni unutdingizmi?</a></div>
      <button type="submit" class="btn">Kirish</button>
    </form>

    <div class="divider"><hr><span>yoki</span><hr></div>
    <button class="social-btn">
      <svg width="16" height="16" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
        <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
        <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-3.59-13.46-8.83l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
      </svg>
      Google orqali kirish
    </button>

    <div class="switch">Hisob yo'qmi? <a href="{% url 'register' %}">Ro'yxatdan o'tish</a></div>
  </div>
</div>
</body>
</html>
