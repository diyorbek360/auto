<div class="cards">
  {% for car in cars %}
  <div class="card">
      <img src="{{ car.image.url }}" alt="">
      <h3>{{ car.brand }} {{ car.model }}</h3>
      <p>{{ car.year }} г.</p>
      <p>Пробег: {{ car.mileage }} км</p>
      <p><b>{{ car.price }} ₽</b></p>
  </div>
  {% endfor %}
</div>
<h2>Каталог машин</h2>
<div id="catalog" class="cards"></div>

<script>
fetch('/api/cars/')
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('catalog');
    data.forEach(car => {
      const card = document.createElement('div');
      card.classList.add('card');
      card.innerHTML = `
        <img src="${car.image}" alt="${car.brand}">
        <h3>${car.brand} ${car.model}</h3>
        <p>Год: ${car.year}</p>
        <p>Цена: $${car.price}</p>
      `;
      container.appendChild(card);
    });
  });
</script>
